name: registry-build-and-publish

on:
  workflow_call:
    inputs:
      image_name:
        description: "Image name in registry"
        required: false
        type: string
        default: ""
      build_context:
        description: "Docker build context"
        required: false
        type: string
        default: "."
      dockerfile_path:
        description: "Dockerfile path"
        required: false
        type: string
        default: ""
      dockerfile_candidates:
        description: "Comma-separated Dockerfile candidates"
        required: false
        type: string
        default: "Dockerfile,Dockerfile.prod,docker/Dockerfile,build/Dockerfile"
      build_platform:
        description: "Buildx platform"
        required: false
        type: string
        default: "linux/amd64"
      runner_labels_json:
        description: "Runner labels as JSON array"
        required: false
        type: string
        default: '["self-hosted","linux","x64"]'
    secrets:
      REGISTRY_USERNAME:
        required: false
      REGISTRY_PASSWORD:
        required: false

jobs:
  build-and-publish:
    runs-on: ${{ fromJSON(inputs.runner_labels_json) }}

    env:
      IMAGE_NAME: ${{ inputs.image_name }}
      REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
      REGISTRY_PORT: ${{ secrets.REGISTRY_PORT }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      BUILD_CONTEXT: ${{ inputs.build_context }}
      DOCKERFILE_PATH: ${{ inputs.dockerfile_path }}
      DOCKERFILE_CANDIDATES: ${{ inputs.dockerfile_candidates }}
      BUILD_PLATFORM: ${{ inputs.build_platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set defaults and validate inputs
        shell: bash
        run: |
          set -euo pipefail

          REGISTRY_HOST_CLEAN="$(printf '%s' "${REGISTRY_HOST:-}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          REGISTRY_PORT_CLEAN="$(printf '%s' "${REGISTRY_PORT:-}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          if [ -z "${REGISTRY_HOST_CLEAN}" ]; then
            echo "vars.REGISTRY_HOST is required in caller repository or organization variables."
            exit 1
          fi

          if [ -z "${REGISTRY_PORT_CLEAN}" ]; then
            REGISTRY_PORT_CLEAN="5000"
          fi

          if [ -z "${IMAGE_NAME:-}" ]; then
            IMAGE_NAME="${GITHUB_REPOSITORY##*/}"
          fi

          if [ -z "${BUILD_CONTEXT:-}" ]; then
            BUILD_CONTEXT="."
          fi

          if [ ! -d "${BUILD_CONTEXT}" ]; then
            echo "Build context directory not found: ${BUILD_CONTEXT}"
            exit 1
          fi

          if [ -z "${DOCKERFILE_CANDIDATES:-}" ]; then
            DOCKERFILE_CANDIDATES="Dockerfile,Dockerfile.prod,docker/Dockerfile,build/Dockerfile"
          fi

          DOCKERFILE_PATH_CLEAN="$(printf '%s' "${DOCKERFILE_PATH:-}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          if [ -z "${DOCKERFILE_PATH_CLEAN}" ]; then
            IFS=',' read -r -a DOCKERFILE_CANDIDATE_ARRAY <<< "${DOCKERFILE_CANDIDATES}"
            for raw_candidate in "${DOCKERFILE_CANDIDATE_ARRAY[@]}"; do
              candidate="$(printf '%s' "${raw_candidate}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
              if [ -n "${candidate}" ] && [ -f "${candidate}" ]; then
                DOCKERFILE_PATH_CLEAN="${candidate}"
                break
              fi
            done
          fi

          if [ -z "${DOCKERFILE_PATH_CLEAN}" ]; then
            echo "No Dockerfile found."
            echo "Set inputs.dockerfile_path or create one of: ${DOCKERFILE_CANDIDATES}"
            exit 1
          fi

          if [ ! -f "${DOCKERFILE_PATH_CLEAN}" ]; then
            echo "Configured dockerfile_path not found: ${DOCKERFILE_PATH_CLEAN}"
            exit 1
          fi

          if [ -z "${BUILD_PLATFORM:-}" ]; then
            BUILD_PLATFORM="linux/amd64"
          fi

          SHORT_SHA="${GITHUB_SHA::12}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            OPER_TAG="${GITHUB_REF_NAME}"
          else
            OPER_TAG="latest"
          fi

          IMAGE_BASE="${REGISTRY_HOST_CLEAN}:${REGISTRY_PORT_CLEAN}/${IMAGE_NAME}"

          echo "REGISTRY_HOST=${REGISTRY_HOST_CLEAN}" >> "${GITHUB_ENV}"
          echo "REGISTRY_PORT=${REGISTRY_PORT_CLEAN}" >> "${GITHUB_ENV}"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "${GITHUB_ENV}"
          echo "BUILD_CONTEXT=${BUILD_CONTEXT}" >> "${GITHUB_ENV}"
          echo "DOCKERFILE_PATH=${DOCKERFILE_PATH_CLEAN}" >> "${GITHUB_ENV}"
          echo "BUILD_PLATFORM=${BUILD_PLATFORM}" >> "${GITHUB_ENV}"
          echo "SHORT_SHA=${SHORT_SHA}" >> "${GITHUB_ENV}"
          echo "OPER_TAG=${OPER_TAG}" >> "${GITHUB_ENV}"
          echo "IMAGE_BASE=${IMAGE_BASE}" >> "${GITHUB_ENV}"

          echo "Image base: ${IMAGE_BASE}"
          echo "Build context: ${BUILD_CONTEXT}"
          echo "Dockerfile path: ${DOCKERFILE_PATH_CLEAN}"
          echo "Build platform: ${BUILD_PLATFORM}"
          echo "Tags: ${SHORT_SHA}, ${OPER_TAG}"

      - name: Setup Buildx builder for HTTP registry
        shell: bash
        run: |
          set -euo pipefail

          REGISTRY_REF="${REGISTRY_HOST}:${REGISTRY_PORT}"
          BUILDKIT_CONFIG_FILE="/tmp/buildkitd.toml"

          printf '[registry."%s"]\n  http = true\n  insecure = true\n' "${REGISTRY_REF}" > "${BUILDKIT_CONFIG_FILE}"

          docker buildx rm ci-builder >/dev/null 2>&1 || true
          docker buildx create --name ci-builder --driver docker-container --buildkitd-config "${BUILDKIT_CONFIG_FILE}" --use
          docker buildx inspect --bootstrap

      - name: Login to internal registry (optional)
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${REGISTRY_USERNAME:-}" ] && [ -n "${REGISTRY_PASSWORD:-}" ]; then
            sanitize_secret() {
              local raw="$1"
              local cleaned

              cleaned="$(printf '%s' "${raw}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

              if [[ "${cleaned}" == \"*\" && "${cleaned}" == *\" ]]; then
                cleaned="${cleaned#\"}"
                cleaned="${cleaned%\"}"
              elif [[ "${cleaned}" == \'*\' ]]; then
                cleaned="${cleaned#\'}"
                cleaned="${cleaned%\'}"
              fi

              printf '%s' "${cleaned}"
            }

            REGISTRY_HOST_CLEAN="$(sanitize_secret "${REGISTRY_HOST}")"
            REGISTRY_PORT_CLEAN="$(sanitize_secret "${REGISTRY_PORT}")"
            REGISTRY_USERNAME_CLEAN="$(sanitize_secret "${REGISTRY_USERNAME}")"
            REGISTRY_PASSWORD_CLEAN="$(sanitize_secret "${REGISTRY_PASSWORD}")"

            PRECHECK_STATUS="$(curl -sS -o /dev/null -w '%{http_code}' "http://${REGISTRY_HOST_CLEAN}:${REGISTRY_PORT_CLEAN}/v2/" || true)"
            echo "Registry endpoint precheck status: ${PRECHECK_STATUS}"
            if [ "${PRECHECK_STATUS}" != "200" ] && [ "${PRECHECK_STATUS}" != "401" ]; then
              echo "Registry endpoint is not reachable at http://${REGISTRY_HOST_CLEAN}:${REGISTRY_PORT_CLEAN}/v2/"
              exit 1
            fi

            AUTH_CHECK_STATUS="$(curl -sS -o /dev/null -w '%{http_code}' -u "${REGISTRY_USERNAME_CLEAN}:${REGISTRY_PASSWORD_CLEAN}" "http://${REGISTRY_HOST_CLEAN}:${REGISTRY_PORT_CLEAN}/v2/" || true)"
            echo "Registry auth check status: ${AUTH_CHECK_STATUS}"
            if [ "${AUTH_CHECK_STATUS}" != "200" ]; then
              echo "Registry rejected configured credentials (status=${AUTH_CHECK_STATUS})."
              echo "Re-save REGISTRY_USERNAME and REGISTRY_PASSWORD in caller repository without extra quotes/spaces/newlines."
              echo "Credential length check: user_len=${#REGISTRY_USERNAME_CLEAN}, pass_len=${#REGISTRY_PASSWORD_CLEAN}"
              exit 1
            fi

            if ! printf '%s' "${REGISTRY_PASSWORD_CLEAN}" | docker login "${REGISTRY_HOST_CLEAN}:${REGISTRY_PORT_CLEAN}" -u "${REGISTRY_USERNAME_CLEAN}" --password-stdin; then
              echo "Docker login failed with configured secrets."
              echo "Re-save credentials in caller repository."
              exit 1
            fi
          else
            echo "Registry login skipped (username/password not configured)."
          fi

      - name: Build and push image
        shell: bash
        run: |
          set -euo pipefail

          docker buildx build \
            --builder ci-builder \
            --platform "${BUILD_PLATFORM}" \
            --file "${DOCKERFILE_PATH}" \
            --tag "${IMAGE_BASE}:${SHORT_SHA}" \
            --tag "${IMAGE_BASE}:${OPER_TAG}" \
            --push \
            "${BUILD_CONTEXT}"

      - name: Cleanup Buildx builder
        if: always()
        shell: bash
        run: |
          docker buildx rm ci-builder >/dev/null 2>&1 || true

      - name: Validate published image
        shell: bash
        run: |
          set -euo pipefail
          docker pull "${IMAGE_BASE}:${SHORT_SHA}"
          echo "Publish validation completed for ${IMAGE_BASE}:${SHORT_SHA}"
