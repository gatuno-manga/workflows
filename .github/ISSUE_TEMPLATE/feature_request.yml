name: Feature Request
description: Sugira uma nova funcionalidade para o projeto
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problema ou Motivação
      placeholder: Sua solicitação está relacionada a um problema? Por favor, descreva.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Solução Proposta
      placeholder: Uma descrição clara e concisa do que você deseja que aconteça.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas Consideradas
      placeholder: Uma descrição clara e concisa de quaisquer soluções ou recursos alternativos que você considerou.
  - type: textarea
    id: additional
    attributes:
      label: Contexto Adicional
      placeholder: Adicione qualquer outro contexto ou capturas de tela sobre a solicitação de recurso aqui.
